title: Chaindoc Labs
tagline: E-Signature Laws and Resources
description: >-
  Open documentation, curated resources, and structured data on blockchain-based
  electronic signatures, eIDAS, ESIGN, and digital trust. Maintained by Chaindoc.
url: https://labs.chaindoc.io
baseurl: ""

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  toc_levels: 2..3

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "docs"
    values:
      layout: page

exclude:
  - data/
  - README.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - LICENSE
  - .github/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/

author: Chaindoc

social:
  twitter: chaindoc_io
  linkedin: chaindoc

twitter:
  username: chaindoc_io
  card: summary_large_image
