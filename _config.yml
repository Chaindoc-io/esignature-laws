title: Chaindoc Labs
tagline: E-Signature Laws and Resources
description: >-
  Open documentation, curated resources, and structured data on blockchain-based
  electronic signatures, eIDAS, ESIGN, and digital trust. Maintained by Chaindoc.
url: https://labs.chaindoc.io
baseurl: ""

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  toc_levels: 2..3

plugins:
  - jekyll-seo-tag
  - jekyll-feed
# Note: sitemap.xml is hand-rolled as a sitemap index (sitemap.xml +
# sitemap-static.xml + sitemap-docs.xml + sitemap-handbook.xml) so we can
# split content by audience. jekyll-sitemap is intentionally not used.

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "docs"
    values:
      layout: page
  - scope:
      path: "compare"
    values:
      layout: page
  - scope:
      path: "industries"
    values:
      layout: page
  - scope:
      path: "handbook"
    values:
      layout: page

exclude:
  - README.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - LICENSE
  - .github/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - scripts/

# data/ is intentionally NOT excluded — JSON datasets (laws.json,
# handbook/de.json, handbook/schema.json) must be web-accessible for
# AI-agent integration and machine-readable open-data consumption.

author: Chaindoc

social:
  twitter: chaindoc_io
  linkedin: chaindoc

twitter:
  username: chaindoc_io
  card: summary_large_image
