name: Schema Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate laws dataset
        run: |
          npx --yes -p ajv-cli -p ajv-formats ajv compile -s data/schema.json -c ajv-formats
          npx --yes -p ajv-cli -p ajv-formats ajv validate -s data/schema.json -d data/laws.json -c ajv-formats --strict=false

      - name: Validate handbook records (all countries)
        run: |
          npx --yes -p ajv-cli -p ajv-formats ajv compile -s data/handbook/schema.json -c ajv-formats --strict=false
          # Records live at data/handbook/<country>/<slug>.json (mindepth 2).
          # Country bundles at data/handbook/<country>.json and the schema itself
          # are at mindepth 1 and therefore excluded automatically.
          for f in $(find data/handbook -mindepth 2 -name '*.json' | sort); do
            echo "Validating $f"
            npx --yes -p ajv-cli -p ajv-formats ajv validate \
              -s data/handbook/schema.json \
              -d "$f" \
              -c ajv-formats --strict=false
          done
