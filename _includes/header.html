<header class="site-header" role="banner">
  <div class="site-header__inner">
    <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="Chaindoc Labs home">
      <img class="site-brand__mark" src="https://chaindoc.io/icons/logo-dark.svg" alt="" width="28" height="28" aria-hidden="true">
      <span class="site-brand__wordmark">
        <span class="site-brand__name">Chaindoc</span>
        <span class="site-brand__sub">Labs</span>
      </span>
    </a>
    <button id="siteNavToggle" class="site-nav-toggle" type="button" aria-expanded="false" aria-controls="siteNav" aria-label="Toggle navigation">
      <span class="site-nav-toggle__bars">
        <span class="site-nav-toggle__bar"></span>
        <span class="site-nav-toggle__bar"></span>
        <span class="site-nav-toggle__bar"></span>
      </span>
      <span class="site-nav-toggle__label">Menu</span>
    </button>
    <nav id="siteNav" class="site-nav" aria-label="Primary">
      <div class="site-nav__group" data-nav-group>
        <button type="button" class="site-nav__group-trigger" aria-expanded="false" aria-haspopup="true">
          <span>Reference</span>
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none" aria-hidden="true">
            <path d="M2 3.5L4.5 6L7 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <ul class="site-nav__group-menu" role="menu" hidden>
          <li role="none"><a role="menuitem" href="{{ '/glossary/' | relative_url }}">Glossary</a></li>
          <li role="none"><a role="menuitem" href="{{ '/awesome/' | relative_url }}">Awesome list</a></li>
          <li role="none"><a role="menuitem" href="{{ '/' | relative_url }}#open-source-sdks">SDKs</a></li>
        </ul>
      </div>
      <div class="site-nav__group" data-nav-group>
        <button type="button" class="site-nav__group-trigger" aria-expanded="false" aria-haspopup="true">
          <span>Topics</span>
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none" aria-hidden="true">
            <path d="M2 3.5L4.5 6L7 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <ul class="site-nav__group-menu" role="menu" hidden>
          <li role="none"><a role="menuitem" href="{{ '/' | relative_url }}#e-signature-laws-by-jurisdiction">Laws by jurisdiction</a></li>
          <li role="none"><a role="menuitem" href="{{ '/compare/eu-vs-us-vs-uk.html' | relative_url }}">Compare</a></li>
          <li role="none"><a role="menuitem" href="{{ '/industries/healthcare.html' | relative_url }}">Industries</a></li>
          <li role="none"><a role="menuitem" href="{{ '/' | relative_url }}#open-data">Open data</a></li>
        </ul>
      </div>
      <div class="site-nav__group" data-nav-group>
        <button type="button" class="site-nav__group-trigger" aria-expanded="false" aria-haspopup="true">
          <span>Handbook</span>
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none" aria-hidden="true">
            <path d="M2 3.5L4.5 6L7 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <ul class="site-nav__group-menu" role="menu" hidden>
          <li role="none"><a role="menuitem" href="{{ '/handbook/' | relative_url }}">Overview</a></li>
          <li role="none"><a role="menuitem" href="{{ '/handbook/de/' | relative_url }}">Germany (DE)</a></li>
          <li role="none"><a role="menuitem" href="{{ '/handbook/us/' | relative_url }}">United States (US)</a></li>
          <li role="none"><a role="menuitem" href="{{ '/handbook/api.html' | relative_url }}">AI agent API</a></li>
        </ul>
      </div>
      <a class="site-nav__external" href="https://github.com/ChaindocIO" rel="noopener">
        <span>GitHub</span>
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
          <path d="M2 9L9 2M9 2H3.5M9 2V7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <a class="site-nav__cta" href="https://chaindoc.io" rel="noopener">
        <span>Website</span>
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
          <path d="M2 9L9 2M9 2H3.5M9 2V7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </nav>
  </div>
</header>
<script>
(function () {
  // Burger toggle (existing behaviour).
  var btn = document.getElementById('siteNavToggle');
  var nav = document.getElementById('siteNav');
  if (btn && nav) {
    btn.addEventListener('click', function () {
      var open = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', open ? 'false' : 'true');
      nav.classList.toggle('site-nav--open', !open);
      document.body.classList.toggle('nav-open', !open);
    });
    document.addEventListener('click', function (e) {
      if (btn.getAttribute('aria-expanded') !== 'true') return;
      if (btn.contains(e.target) || nav.contains(e.target)) return;
      btn.setAttribute('aria-expanded', 'false');
      nav.classList.remove('site-nav--open');
      document.body.classList.remove('nav-open');
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && btn.getAttribute('aria-expanded') === 'true') {
        btn.setAttribute('aria-expanded', 'false');
        nav.classList.remove('site-nav--open');
        document.body.classList.remove('nav-open');
        btn.focus();
      }
    });
  }

  // Dropdown groups.
  var groups = document.querySelectorAll('[data-nav-group]');
  function closeAll(except) {
    groups.forEach(function (g) {
      if (g === except) return;
      var t = g.querySelector('.site-nav__group-trigger');
      var m = g.querySelector('.site-nav__group-menu');
      if (t) t.setAttribute('aria-expanded', 'false');
      if (m) m.hidden = true;
    });
  }
  groups.forEach(function (g) {
    var trigger = g.querySelector('.site-nav__group-trigger');
    var menu = g.querySelector('.site-nav__group-menu');
    if (!trigger || !menu) return;
    trigger.addEventListener('click', function (e) {
      e.stopPropagation();
      var open = trigger.getAttribute('aria-expanded') === 'true';
      closeAll(g);
      trigger.setAttribute('aria-expanded', open ? 'false' : 'true');
      menu.hidden = open;
    });
    trigger.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        trigger.setAttribute('aria-expanded', 'false');
        menu.hidden = true;
        trigger.focus();
      }
    });
  });
  document.addEventListener('click', function (e) {
    var inside = false;
    groups.forEach(function (g) { if (g.contains(e.target)) inside = true; });
    if (!inside) closeAll(null);
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeAll(null);
  });
})();
</script>
